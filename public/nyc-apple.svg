<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 64" fill="none">
  <defs>
    <radialGradient id="appleSkin" cx="32%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#ff8a8a" />
      <stop offset="42%" stop-color="#e32626" />
      <stop offset="100%" stop-color="#8f1414" />
    </radialGradient>
    <radialGradient id="appleGlow" cx="28%" cy="22%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="appleDrop" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#1a1a24" flood-opacity="0.35" />
    </filter>
  </defs>
  <!-- soft ground shadow inside the well -->
  <ellipse cx="28" cy="54" rx="14" ry="4" fill="#1a1a24" opacity="0.12" />
  <!-- stem -->
  <path
    fill="#6b4a2e"
    d="M27 6c2.2-2.8 6.8-3.5 10-1.5.8 2.2-.5 4.6-2.8 5.5-2.5-2.8-5.5-3.5-7.2-4z"
  />
  <path fill="#8f6744" d="M29 9c1.8 1 3.6 2.6 4.5 5-2 .6-3.8-.3-4.5-2.4z" />
  <!-- body -->
  <path
    fill="url(#appleSkin)"
    filter="url(#appleDrop)"
    d="M28 11c18 1.2 26 17 23 33.5C48 56 38 62 28 62S9 56 6 44.5 3 23 21 11c3-1 7-1 7-1z"
  />
  <ellipse cx="21" cy="26" rx="11" ry="15" fill="url(#appleGlow)" />
</svg>
